<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard_PracticaBoostrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand">Mi Progreso</span>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="mb-4">Seguimiento de Salud</h2>
        <div class="card mb-5 bg-light">
             <div class="card-body">
                 <form id="pesoForm" class="row g-3 align-items-end">
                    <div class="col-12 col-md-4">
                        <label class="form-label">Peso actual (kg)</label>
                        <input type="number" id="pesoInput" step="0.1" class="form-control" required>
                    </div>
                    <div class="col-12 col-md-4">
                         <label class="form-label">Fecha de registro</label>
                        <input type="date" id="fechaInput" class="form-control" required>
                    </div>
                    <div class="col-12 col-md-4">
                        <button type="submit" class="btn btn-success w-100">Registrar Peso</button>
                    </div>
                 </form>
            </div>
        </div>

        <div class="mt-4">
            <h4 class="mb-3">Historial de Registros</h4>
            <div class="table-responsive">
                <table class="table table-striped table-hover" id="tablaPeso">
                    <thead class="table-dark">
                        <tr>
                            <th>Fecha</th>
                            <th>Peso Registrado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-06-25</td>
                            <td>74.5</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="mt-5">
            <h4 class="mb-4">Evolución de Peso</h4>
            <canvas id="graficaPeso"></canvas>
        </div>
    </div>
    
    <script>
        const ctx = document.getElementById('graficaPeso').getContext('2d');
        const labels = ['2026-06-25'];
        const dataPoints = [74.5];

        const chart = new Chart(ctx, {
            type: 'line', // Puedes cambiar a 'bar' si prefieres histograma
            data: {
                labels: labels,
                datasets: [{
                    label: 'Peso (kg)',
                    data: dataPoints,
                    borderColor: 'rgb(75, 192, 192)',
                    tension: 0.1
                }]
            }
        });

        document.getElementById('pesoForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
          
            const fecha = document.getElementById('fechaInput').value;
            const peso = document.getElementById('pesoInput').value;

          
            const tbody = document.querySelector('#tablaPeso tbody');
            const newRow = tbody.insertRow();
            newRow.insertCell(0).innerText = fecha;
            newRow.insertCell(1).innerText = peso;

           
            chart.data.labels.push(fecha);
            chart.data.datasets[0].data.push(parseFloat(peso));
            chart.update();

           
            this.reset();
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
